name: Verify design tokens

on:
  pull_request:
    paths:
      - "tokens/**"
      - "scripts/build-tokens.mjs"
      - "scripts/verify-tokens.mjs"
      - "generated/**"
      - "src/global/design-tokens/_colors.scss"
  push:
    branches: [main]
    paths:
      - "tokens/**"
      - "scripts/**"
      - "generated/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run verify:tokens
